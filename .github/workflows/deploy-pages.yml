name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build wizard-of-os
        run: |
          cd wizard-of-os
          npm ci
          npm run build

      - name: Build choose-your-adventure
        run: |
          cd choose-your-adventure
          npm ci
          npm run build

      - name: Prepare deployment
        run: |
          mkdir -p deploy/wizard-of-os deploy/choose-your-adventure
          cp -r wizard-of-os/dist/* deploy/wizard-of-os/
          cp -r choose-your-adventure/dist/* deploy/choose-your-adventure/
          # Root index for easy navigation
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Summit Research 2026</title></head><body><h1>Summit Research 2026</h1><ul><li><a href="wizard-of-os/">The Wizard of OS</a></li><li><a href="choose-your-adventure/">Choose your adventure</a></li></ul></body></html>' > deploy/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
